<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a3a5c" />
  <meta name="description" content="S R Patil Hospital & Research Centre, Badgandi — Hospital Management System" />
  <title>SRP Hospital — Badgandi</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon"><i class="ti ti-heart-plus"></i></div>
        <h1>S R Patil Hospital</h1>
        <p>& Research Centre, Badgandi</p>
      </div>
      <div class="login-form">
        <div class="form-group">
          <label>Username</label>
          <div class="input-icon-wrap"><i class="ti ti-user"></i><input type="text" id="login-user" placeholder="Enter username" value="admin" /></div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-icon-wrap"><i class="ti ti-lock"></i><input type="password" id="login-pass" placeholder="Enter password" value="admin123" /></div>
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="login-role">
            <option value="chairman">Chairman</option>
            <option value="ceo">CEO / Director</option>
            <option value="admin" selected>Admin</option>
            <option value="doctor">Doctor</option>
            <option value="nurse">Nurse</option>
            <option value="hr">HR Manager</option>
            <option value="finance">Finance Officer</option>
            <option value="reception">Reception</option>
          </select>
        </div>
        <button class="btn btn-primary btn-full" onclick="doLogin()">
          <i class="ti ti-login"></i> Sign In
        </button>
        <p class="login-note">Demo: any username/password works. Select your role above.</p>
      </div>
    </div>
  </div>

  <!-- APP SHELL (hidden until login) -->
  <div id="app-shell" class="app-shell hidden">

    <!-- SIDEBAR OVERLAY (mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- SIDEBAR -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="logo-icon"><i class="ti ti-heart-plus"></i></div>
          <div>
            <span class="logo-name">SRP Hospital</span>
            <span class="logo-sub">Badgandi</span>
          </div>
        </div>
        <button class="sidebar-close" onclick="closeSidebar()"><i class="ti ti-x"></i></button>
      </div>

      <div class="sidebar-user">
        <div class="avatar avatar-md" id="sidebar-avatar">AD</div>
        <div>
          <div class="sidebar-user-name" id="sidebar-name">Admin</div>
          <div class="sidebar-user-role" id="sidebar-role">Administrator</div>
        </div>
        <div class="online-dot"></div>
      </div>

      <nav class="sidebar-nav" id="sidebar-nav">
        <!-- Dynamically built by js/nav.js based on role -->
      </nav>
    </aside>

    <!-- MAIN AREA -->
    <div class="main-wrap">

      <!-- TOP BAR -->
      <header class="topbar">
        <button class="topbar-menu-btn" onclick="openSidebar()"><i class="ti ti-menu-2"></i></button>
        <div class="topbar-title" id="topbar-title">Dashboard</div>
        <div class="topbar-actions">
          <button class="topbar-btn" onclick="App.showPage('search')" title="Search"><i class="ti ti-search"></i></button>
          <button class="topbar-btn notif-btn" onclick="App.showPage('notifications')" title="Notifications">
            <i class="ti ti-bell"></i>
            <span class="notif-badge" id="notif-count">5</span>
          </button>
          <button class="topbar-btn" onclick="window.print()" title="Print"><i class="ti ti-printer"></i></button>
          <button class="topbar-btn" onclick="doLogout()" title="Logout"><i class="ti ti-logout"></i></button>
        </div>
      </header>

      <!-- PAGE CONTENT -->
      <main class="page-content" id="page-content">
        <!-- Pages loaded dynamically by js/router.js -->
        <div id="page-loading" class="page-loading">
          <div class="spinner"></div>
          <p>Loading...</p>
        </div>
      </main>

    </div>
  </div>

  <!-- MODAL CONTAINER -->
  <div id="modal-container"></div>

  <!-- TOAST CONTAINER -->
  <div id="toast-container"></div>

  <!-- SCRIPTS -->
  <script src="js/data.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/components.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
