<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#1a3a5c"/>
<title>SRP Hospital — Badgandi</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
<style>
:root{--pr:#1a3a5c;--pl:#2563a8;--ac:#c8873a;--su:#1a7a4a;--da:#b83232;--wa:#c87a00;--in:#1a6a9a;--bg:#f0f3f8;--sf:#fff;--s2:#eef1f7;--s3:#e4e9f2;--bd:rgba(26,58,92,.12);--tx:#0f1e30;--t2:#4a6080;--t3:#8a9fb8;--sw:260px;--th:60px;--ra:10px;--sh:0 2px 12px rgba(0,0,0,.08);--shm:0 4px 24px rgba(0,0,0,.12);--shl:0 8px 48px rgba(0,0,0,.18)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:4px}
.hidden{display:none!important}
/* LOGIN */
.login-screen{min-height:100vh;background:linear-gradient(135deg,#1a3a5c 0%,#0d2540 60%,#1a3a5c 100%);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:16px;padding:40px 36px;width:100%;max-width:420px;box-shadow:var(--shl)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo-icon{width:64px;height:64px;background:var(--pr);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;color:#fff;margin:0 auto 12px;box-shadow:0 4px 16px rgba(26,58,92,.3)}
.login-logo h1{font-family:'Playfair Display',serif;font-size:22px;color:var(--pr);line-height:1.2}
.login-logo p{font-size:13px;color:var(--t2);margin-top:4px}
.login-note{font-size:12px;color:var(--t3);text-align:center;margin-top:12px}
.iw{position:relative}.iw i{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:17px;color:var(--t3)}.iw input{padding-left:36px!important}
/* APP SHELL */
.app-shell{display:flex;min-height:100vh}
/* SIDEBAR */
aside{position:fixed;top:0;left:0;bottom:0;width:var(--sw);background:#fff;border-right:1px solid var(--bd);display:flex;flex-direction:column;z-index:200;overflow:hidden;transition:transform .2s ease}
.sb-head{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 0;flex-shrink:0}
.sb-logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:var(--pr);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0}
.logo-name{display:block;font-size:13.5px;font-weight:700;color:var(--tx);line-height:1.2}
.logo-sub{display:block;font-size:11px;color:var(--t3)}
.sb-close{display:none;background:none;border:none;font-size:20px;color:var(--t2);cursor:pointer;padding:4px;border-radius:6px}
.sb-user{display:flex;align-items:center;gap:10px;padding:12px 14px;margin:12px 10px 0;background:var(--s2);border-radius:var(--ra);flex-shrink:0}
.sb-uname{font-size:13px;font-weight:600;color:var(--tx);line-height:1.2}
.sb-urole{font-size:11px;color:var(--t3)}
.online-dot{width:8px;height:8px;background:#22c55e;border-radius:50%;margin-left:auto;flex-shrink:0;box-shadow:0 0 5px #22c55e}
.sb-nav{flex:1;overflow-y:auto;padding:6px 0 24px}
.nav-sec{padding:0 10px;margin-top:8px}
.nav-lbl{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;padding:6px 8px 4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:all .15s;margin-bottom:1px;font-family:'Inter',sans-serif}
.nav-item i{font-size:18px;flex-shrink:0}
.nav-item:hover{background:var(--s2);color:var(--pr)}
.nav-item.active{background:rgba(26,58,92,.09);color:var(--pr);font-weight:600}
.nav-badge{margin-left:auto;font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;color:#fff;flex-shrink:0}
.nb-red{background:var(--da)}.nb-green{background:var(--su)}.nb-amber{background:var(--wa)}.nb-blue{background:var(--in)}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:190}
/* MAIN */
.main-wrap{flex:1;margin-left:var(--sw);display:flex;flex-direction:column;min-width:0}
/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;height:var(--th);background:#fff;border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;gap:12px;box-shadow:var(--sh)}
.tb-menu{display:none;background:none;border:none;font-size:22px;color:var(--t2);cursor:pointer;padding:4px;border-radius:6px}
.tb-title{font-size:16px;font-weight:700;color:var(--tx);flex:1}
.tb-actions{display:flex;align-items:center;gap:4px}
.tb-btn{position:relative;background:none;border:none;width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--t2);cursor:pointer;transition:.15s}
.tb-btn:hover{background:var(--s2);color:var(--pr)}
.notif-badge{position:absolute;top:4px;right:4px;background:var(--da);color:#fff;font-size:9px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}
/* PAGE */
.page-content{flex:1;padding:22px 26px;overflow-x:hidden}
.page-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:16px;color:var(--t2)}
.spinner{width:36px;height:36px;border:3px solid var(--bd);border-top-color:var(--pr);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* PAGE HEADER */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;gap:12px;flex-wrap:wrap}
.ph h2{font-size:20px;font-weight:700}
.ph p{font-size:13px;color:var(--t2);margin-top:2px}
.ph-r{display:flex;gap:8px;flex-wrap:wrap}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;border:none;transition:.15s;white-space:nowrap;text-decoration:none}
.btn i{font-size:16px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-pr{background:var(--pr);color:#fff}.btn-pr:hover{background:var(--pl)}
.btn-ac{background:var(--ac);color:#fff}.btn-ac:hover{opacity:.9}
.btn-su{background:var(--su);color:#fff}.btn-su:hover{opacity:.9}
.btn-da{background:var(--da);color:#fff}.btn-da:hover{opacity:.9}
.btn-wa{background:var(--wa);color:#fff}.btn-wa:hover{opacity:.9}
.btn-ol{background:#fff;border:1px solid var(--bd);color:var(--t2)}.btn-ol:hover{background:var(--s2);color:var(--pr)}
.btn-sm{padding:5px 10px;font-size:12px}.btn-sm i{font-size:14px}
.btn-full{width:100%}
/* CARDS */
.card{background:#fff;border:1px solid var(--bd);border-radius:var(--ra);padding:18px 20px;box-shadow:var(--sh)}
.card+.card{margin-top:16px}
.card-title{font-size:14px;font-weight:700;color:var(--tx);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-title i{font-size:18px;color:var(--pl)}
/* METRICS */
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.mc{background:#fff;border:1px solid var(--bd);border-radius:var(--ra);padding:14px 16px;border-left:4px solid var(--pr);box-shadow:var(--sh)}
.mc.ac{border-left-color:var(--ac)}.mc.su{border-left-color:var(--su)}.mc.da{border-left-color:var(--da)}.mc.wa{border-left-color:var(--wa)}.mc.in{border-left-color:var(--in)}
.ml{font-size:10.5px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.07em}
.mv{font-size:24px;font-weight:700;color:var(--tx);margin:4px 0 2px;line-height:1}
.ms{font-size:11.5px;color:var(--t2)}
.ms.up{color:var(--su)}.ms.dn{color:var(--da)}
/* TABLE */
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--s2)}
th{font-size:10.5px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;padding:10px 13px;text-align:left;border-bottom:1px solid var(--bd);white-space:nowrap}
td{padding:10px 13px;border-bottom:1px solid var(--bd);color:var(--tx);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--s2)}
/* STATUS */
.st{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.st::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0}
.st-ok{background:#e6f7ee;color:var(--su)}.st-ok::before{background:var(--su)}
.st-wa{background:#fef3e2;color:var(--wa)}.st-wa::before{background:var(--wa)}
.st-da{background:#fee8e8;color:var(--da)}.st-da::before{background:var(--da)}
.st-in{background:#dce8f8;color:var(--in)}.st-in::before{background:var(--in)}
/* TAGS */
.tag{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px}
.tg-bl{background:#dce8f8;color:var(--pr)}.tg-am{background:#fcefd6;color:var(--wa)}.tg-gr{background:#d6f0e4;color:var(--su)}.tg-rd{background:#fce0e0;color:var(--da)}.tg-gy{background:var(--s2);color:var(--t2)}
/* AVATAR */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
.av-sm{width:28px;height:28px;font-size:10px}.av-md{width:36px;height:36px;font-size:13px}.av-lg{width:52px;height:52px;font-size:18px;border-radius:12px}.av-xl{width:64px;height:64px;font-size:22px;border-radius:14px}
.c-pr{background:var(--pr)}.c-ac{background:var(--ac)}.c-su{background:var(--su)}.c-da{background:var(--da)}.c-wa{background:var(--wa)}.c-in{background:var(--in)}.c-tl{background:#1a7a6a}.c-pu{background:#6b3fa0}
/* PROFILE CHIP */
.pc{display:flex;align-items:center;gap:8px}
/* FORMS */
.fg{margin-bottom:13px}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 12px;border:1px solid var(--bd);border-radius:8px;font-size:13px;color:var(--tx);background:#fff;font-family:'Inter',sans-serif;outline:none;transition:.15s;-webkit-appearance:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--pl);box-shadow:0 0 0 3px rgba(37,99,168,.1)}
.fg textarea{resize:vertical;min-height:75px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:11px}
/* MODAL */
.mo{display:none;position:fixed;inset:0;z-index:500;background:rgba(10,20,40,.55);align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px)}
.mo.open{display:flex}
.md{background:#fff;border-radius:14px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shl);animation:mdin .2s ease}
.md-lg{max-width:720px}
@keyframes mdin{from{transform:translateY(20px) scale(.97);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.mh{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 0;position:sticky;top:0;background:#fff;z-index:1}
.mh h3{font-size:16px;font-weight:700}
.mc-btn{background:var(--s2);border:none;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--t2)}
.mc-btn:hover{background:var(--s3)}
.mb{padding:16px 20px 20px}
.mf{display:flex;gap:8px;justify-content:flex-end;padding-top:14px;border-top:1px solid var(--bd);margin-top:16px}
/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:18px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:9px 15px;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap;transition:.15s;font-family:'Inter',sans-serif}
.tab:hover{color:var(--pr)}.tab.active{color:var(--pr);border-bottom-color:var(--pr);font-weight:600}
.tab-panel{display:none}.tab-panel.active{display:block}
/* PROGRESS */
.pbar{background:var(--s2);border-radius:4px;height:7px;overflow:hidden}
.pfill{height:100%;border-radius:4px;transition:width .4s}
.pf-pr{background:var(--pl)}.pf-su{background:var(--su)}.pf-da{background:var(--da)}.pf-wa{background:var(--wa)}.pf-ac{background:var(--ac)}
/* ACTIVITY */
.ai{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--bd)}
.ai:last-child{border-bottom:none}
.ai-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ai-bl{background:#dce8f8;color:var(--pr)}.ai-gr{background:#d6f0e4;color:var(--su)}.ai-am{background:#fcefd6;color:var(--wa)}.ai-rd{background:#fce0e0;color:var(--da)}
.ai-body{flex:1;min-width:0}.ai-body p{font-size:13px}.ai-body span{font-size:11px;color:var(--t3)}
/* ANNOUNCE */
.ac-card{background:#fff;border:1px solid var(--bd);border-left:4px solid var(--pr);border-radius:var(--ra);padding:13px 16px;margin-bottom:11px;box-shadow:var(--sh)}
.ac-card.urgent{border-left-color:var(--da)}.ac-card.success{border-left-color:var(--su)}.ac-card.info{border-left-color:var(--in)}.ac-card.warning{border-left-color:var(--wa)}
.ac-title{font-size:14px;font-weight:600;margin-bottom:4px}
.ac-meta{font-size:11px;color:var(--t3);margin-bottom:5px;display:flex;gap:8px;flex-wrap:wrap}
.ac-body{font-size:13px;color:var(--t2);line-height:1.6}
/* TIMELINE */
.tl{position:relative;padding-left:26px}
.tl::before{content:'';position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:var(--bd)}
.tl-item{position:relative;margin-bottom:16px}
.tl-item::before{content:'';position:absolute;left:-23px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--pl);border:2px solid #fff}
.tl-date{font-size:11px;color:var(--t3);margin-bottom:3px}
.tl-text{font-size:13.5px}
/* SEARCH BAR */
.sbar{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--bd);border-radius:8px;padding:7px 12px}
.sbar:focus-within{border-color:var(--pl)}
.sbar i{color:var(--t3);font-size:16px;flex-shrink:0}
.sbar input{border:none;outline:none;font-size:13.5px;color:var(--tx);background:transparent;flex:1;font-family:'Inter',sans-serif;min-width:0}
/* FILTER ROW */
.frow{display:flex;align-items:center;gap:9px;margin-bottom:14px;flex-wrap:wrap}
.frow select{padding:7px 11px;border:1px solid var(--bd);border-radius:8px;font-size:13px;color:var(--tx);background:#fff;font-family:'Inter',sans-serif;cursor:pointer;outline:none;-webkit-appearance:none}
/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
/* DEPT CARD */
.dc{background:#fff;border:1px solid var(--bd);border-radius:var(--ra);padding:16px;box-shadow:var(--sh);cursor:pointer;transition:.15s}
.dc:hover{box-shadow:var(--shm);transform:translateY(-2px)}
.dc-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:21px;margin-bottom:8px}
.dc-name{font-size:14px;font-weight:700;margin-bottom:2px}
.dc-info{font-size:12px;color:var(--t2)}
.dc-stat{font-size:22px;font-weight:700;color:var(--pr);margin-top:7px}
.dc-sl{font-size:11px;color:var(--t3)}
/* UTILS */
.flex{display:flex}.fc{display:flex;align-items:center}.fb{display:flex;align-items:center;justify-content:space-between}
.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}.gap16{gap:16px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb14{margin-bottom:14px}
.tm{color:var(--t2);font-size:13px}.tsm{font-size:12px}.fw6{font-weight:600}.fw7{font-weight:700}
hr.dv{border:none;border-top:1px solid var(--bd);margin:16px 0}
.es{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;color:var(--t3);text-align:center}
.es i{font-size:44px;margin-bottom:10px}.es h4{font-size:15px;font-weight:600;color:var(--t2);margin-bottom:5px}.es p{font-size:13px}
/* TOAST */
#toast-c{position:fixed;bottom:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:7px}
.toast{background:var(--tx);color:#fff;padding:11px 16px;border-radius:10px;font-size:13.5px;box-shadow:var(--shm);display:flex;align-items:center;gap:9px;animation:tup .22s ease;max-width:320px}
.toast.success{background:var(--su)}.toast.error{background:var(--da)}.toast.warning{background:var(--wa)}
@keyframes tup{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
/* PRINT */
@media print{aside,.topbar,.ph-r,.btn,#toast-c{display:none!important}.main-wrap{margin-left:0!important}.page-content{padding:12px!important}}
/* RESPONSIVE */
@media(max-width:768px){
  aside{transform:translateX(-100%);box-shadow:var(--shl)}
  aside.open{transform:translateX(0)}
  .sb-overlay.open{display:block}
  .sb-close{display:flex}
  .main-wrap{margin-left:0}
  .tb-menu{display:flex}
  .page-content{padding:14px}
  .g2,.g3{grid-template-columns:1fr}
  .fr{grid-template-columns:1fr}
  .mg{grid-template-columns:repeat(2,1fr)}
  .ph{flex-direction:column;align-items:flex-start}
  .ph-r{width:100%}
}
@media(max-width:480px){
  .mg{grid-template-columns:repeat(2,1fr);gap:9px}
  .mv{font-size:20px}
  .login-card{padding:26px 18px}
  .mo{padding:8px;align-items:flex-end}
  .md{border-bottom-left-radius:0;border-bottom-right-radius:0;max-height:92vh}
  #toast-c{bottom:10px;right:10px;left:10px}
  .toast{max-width:100%}
  .hxs{display:none!important}
}
@media(min-width:1400px){.page-content{padding:26px 34px}}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon"><i class="ti ti-heart-plus"></i></div>
      <h1>S R Patil Hospital</h1>
      <p>&amp; Research Centre, Badgandi</p>
    </div>
    <div class="form-group" style="margin-bottom:13px">
      <div class="fg"><label>Username</label>
        <div class="iw"><i class="ti ti-user"></i><input type="text" id="lu" placeholder="Enter username" value="admin"/></div>
      </div>
      <div class="fg"><label>Password</label>
        <div class="iw"><i class="ti ti-lock"></i><input type="password" id="lp" placeholder="Password" value="admin123"/></div>
      </div>
      <div class="fg"><label>Login As</label>
        <select id="lr">
          <option value="chairman">👑 Chairman</option>
          <option value="ceo">🏢 CEO / Director</option>
          <option value="admin" selected>⚙️ Admin</option>
          <option value="doctor">🩺 Doctor</option>
          <option value="nurse">💊 Nurse</option>
          <option value="hr">👥 HR Manager</option>
          <option value="finance">💰 Finance Officer</option>
          <option value="reception">🖥️ Reception</option>
        </select>
      </div>
      <button class="btn btn-pr btn-full" onclick="doLogin()" style="margin-top:4px">
        <i class="ti ti-login"></i> Sign In
      </button>
      <p class="login-note">Demo: any credentials work. Select your role above.</p>
    </div>
  </div>
</div>

<!-- ══ APP SHELL ══ -->
<div id="app-shell" class="app-shell hidden">
  <div class="sb-overlay" id="sb-overlay" onclick="closeSB()"></div>
  <aside id="sidebar">
    <div class="sb-head">

/* ═══════════ UI HELPERS ═══════════ */
const U = {
  toast(msg,type="default",dur=3000){
    const icons={success:"ti-check",error:"ti-x",warning:"ti-alert-triangle",default:"ti-info-circle"};
    const t=document.createElement('div');
    t.className="toast "+(type==="default"?"":type);
    t.innerHTML=`<i class="ti ${icons[type]||icons.default}"></i> ${msg}`;
    document.getElementById('toast-c').appendChild(t);
    setTimeout(()=>t.remove(),dur);
  },
  modal(title,body,size=""){
    let o=document.getElementById('_mo');
    if(o)o.remove();
    o=document.createElement('div');
    o.id="_mo";o.className="mo";
    o.innerHTML=`<div class="md ${size}" role="dialog"><div class="mh"><h3>${title}</h3><button class="mc-btn" onclick="U.closeModal()">✕</button></div><div class="mb">${body}</div></div>`;
    o.addEventListener('click',e=>{if(e.target===o)this.closeModal()});
    document.getElementById('modal-c').appendChild(o);
    requestAnimationFrame(()=>o.classList.add('open'));
  },
  closeModal(){const o=document.getElementById('_mo');if(o)o.remove()},
  st(s){
    const m={active:"st-ok",present:"st-ok",paid:"st-ok",approved:"st-ok",delivered:"st-ok",open:"st-ok",admitted:"st-ok",interview:"st-ok",awarded:"st-ok",
             pending:"st-wa",review:"st-wa",shortlisted:"st-wa",partial:"st-wa",leave:"st-wa",evaluation:"st-wa",
             inactive:"st-da",absent:"st-da",rejected:"st-da",expired:"st-da",out:"st-da",critical:"st-da",unpaid:"st-da",
             discharged:"st-in",opd:"st-in"};
    const l={active:"Active",present:"Present",paid:"Paid",approved:"Approved",delivered:"Delivered",open:"Open",admitted:"Admitted",interview:"Interview",awarded:"Awarded",
             pending:"Pending",review:"Under Review",shortlisted:"Shortlisted",partial:"Partial",leave:"On Leave",evaluation:"Evaluation",
             inactive:"Inactive",absent:"Absent",rejected:"Rejected",expired:"Expired",out:"Out of Stock",critical:"Critical",unpaid:"Unpaid",
             discharged:"Discharged",opd:"OPD"};
    return `<span class="st ${m[s]||'st-wa'}">${l[s]||s}</span>`;
  },
  av(n,sz="av-sm"){return`<div class="av ${sz} ${DB.avColor(n)}">${DB.initials(n)}</div>`},
  pc(n,sub=""){return`<div class="pc gap8">${this.av(n)}<div><div style="font-size:13px;font-weight:500">${n}</div>${sub?`<div style="font-size:11px;color:var(--t3)">${sub}</div>`:""}</div></div>`},
  metric(label,val,sub="",type=""){return`<div class="mc ${type}"><div class="ml">${label}</div><div class="mv">${val}</div>${sub?`<div class="ms">${sub}</div>`:""}</div>`},
  table(headers,rows,empty="No records found"){
    if(!rows.length)return`<div class="es"><i class="ti ti-database-off"></i><h4>${empty}</h4></div>`;
    return`<div class="tw"><table><thead><tr>${headers.map(h=>`<th${h.xs?' class="hxs"':''}>` +h.l+'</th>').join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map((c,i)=>`<td${headers[i]?.xs?' class="hxs"':''}>` +c+'</td>').join('')}</tr>`).join('')}</tbody></table></div>`;
  },
  prRow(label,v,max,col="pf-pr"){const p=Math.round(v/max*100);return`<div class="mb14"><div class="fb mb8"><span style="font-size:13px">${label}</span><span style="font-size:13px;font-weight:600">${v}/${max}</span></div><div class="pbar"><div class="pfill ${col}" style="width:${p}%"></div></div></div>`},
  card(title,body,icon=""){return`<div class="card">${title?`<div class="card-title">${icon?`<i class="ti ${icon}"></i>`:""} ${title}</div>`:""} ${body}</div>`},
  acCard(a){const em={urgent:"🔴",success:"✅",info:"📋",warning:"⚠️"};const tg={urgent:`<span class="tag tg-rd">Urgent</span>`,success:`<span class="tag tg-gr">Update</span>`,info:`<span class="tag tg-bl">Info</span>`,warning:`<span class="tag tg-am">Alert</span>`};return`<div class="ac-card ${a.type}"><div class="ac-title">${em[a.type]||""} ${a.title}</div><div class="ac-meta"><span>${a.author}</span><span>${a.date}</span>${tg[a.type]||""}</div><div class="ac-body">${a.body}</div></div>`},
  ai(icon,col,title,sub,action=""){return`<div class="ai"><div class="ai-icon ${col}"><i class="ti ${icon}"></i></div><div class="ai-body"><p>${title}</p><span>${sub}</span></div>${action}</div>`},
  tlItem(date,text){return`<div class="tl-item"><div class="tl-date">${date}</div><div class="tl-text">${text}</div></div>`},
  fg(label,input){return`<div class="fg"><label>${label}</label>${input}</div>`},
  inp(name,type="text",ph="",val=""){return`<input type="${type}" name="${name}" placeholder="${ph}" value="${val}">`},
  sel(name,opts){return`<select name="${name}">${opts.map(o=>`<option>${o}</option>`).join("")}</select>`},
  ta(name,ph,rows=3){return`<textarea name="${name}" rows="${rows}" placeholder="${ph}"></textarea>`},
  ph(title,sub,actions=""){document.getElementById('tb-title').textContent=title;return`<div class="ph"><div><h2>${title}</h2>${sub?`<p>${sub}</p>`:""}</div>${actions?`<div class="ph-r">${actions}</div>`:""}</div>`}
};

function buildNav(role){
  const allowed=DB.roles[role]?.pages||[];
  const nav=document.getElementById('sb-nav');
  nav.innerHTML="";
  NAV.forEach(sec=>{
    const vis=sec.items.filter(i=>allowed.includes(i.id));
    if(!vis.length)return;
    const d=document.createElement('div');
    d.className="nav-sec";
    d.innerHTML=`<div class="nav-lbl">${sec.lbl}</div>`;
    vis.forEach(item=>{
      const b=document.createElement('button');
      b.className="nav-item";b.dataset.pid=item.id;
      b.innerHTML=`<i class="ti ${item.icon}"></i>${item.label}${item.badge?`<span class="nav-badge ${item.bc||''}">${item.badge}</span>`:""}`;
      b.onclick=()=>{closeSB();showPage(item.id)};
      d.appendChild(b);
    });
    nav.appendChild(d);
  });
}
function setActiveNav(pid){document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.pid===pid))}
function openSB(){document.getElementById('sidebar').classList.add('open');document.getElementById('sb-overlay').classList.add('open');document.body.style.overflow='hidden'}
function closeSB(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sb-overlay').classList.remove('open');document.body.style.overflow=''}

/* ═══════════ SEARCH ═══════════ */
function doSearch(q){
  const el=document.getElementById('search-res');if(!el)return;
  if(!q){el.innerHTML='<div class="es"><i class="ti ti-search"></i><h4>Type to search</h4></div>';return;}
  const ql=q.toLowerCase();
  let results=[];
  DB.patients.filter(p=>p.name.toLowerCase().includes(ql)||p.uhid.toLowerCase().includes(ql)).forEach(p=>results.push({icon:'ti-user-heart',color:'ai-bl',text:`Patient: ${p.name} (${p.uhid})`,sub:p.ward,page:'patients'}));
  DB.staff.filter(s=>s.name.toLowerCase().includes(ql)||s.dept.toLowerCase().includes(ql)).forEach(s=>results.push({icon:'ti-users',color:'ai-gr',text:`Staff: ${s.name} — ${s.dept}`,sub:s.role,page:'staff'}));
  DB.pos.filter(p=>p.id.toLowerCase().includes(ql)||p.vendor.toLowerCase().includes(ql)).forEach(p=>results.push({icon:'ti-file-invoice',color:'ai-am',text:`PO: ${p.id} — ${p.vendor}`,sub:`${DB.inr(p.amount)} • ${p.status}`,page:'purchase'}));
  DB.licenses.filter(l=>l.name.toLowerCase().includes(ql)).forEach(l=>results.push({icon:'ti-certificate',color:'ai-rd',text:`License: ${l.name}`,sub:l.status,page:'nmc'}));
  if(!results.length){el.innerHTML='<div class="es"><i class="ti ti-search-off"></i><h4>No results found</h4><p>Try different keywords</p></div>';return;}
  el.innerHTML=results.slice(0,10).map(r=>`<div class="ai" style="cursor:pointer" onclick="showPage('${r.page}')"><div class="ai-icon ${r.color}"><i class="ti ${r.icon}"></i></div><div class="ai-body"><p>${r.text}</p><span>${r.sub}</span></div></div>`).join('');
}

/* ═══════════ TABS INIT ═══════════ */
function initTabs(container){
  container.querySelectorAll('.tab').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id=btn.dataset.tp;
      container.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b===btn));
      container.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active',p.id===id));
    });
  });
}

/* ═══════════ SHOW PAGE ═══════════ */
function showPage(pid){
  const renderer=P[pid];
  if(!renderer){U.toast('Page coming soon','default');return;}
  setActiveNav(pid);
  const content=document.getElementById('page-content');
  content.innerHTML='<div class="page-loading"><div class="spinner"></div><p>Loading...</p></div>';
  requestAnimationFrame(()=>{
    try{
      content.innerHTML=renderer.call(P);
      // init tabs
      const tabsEl=content.querySelector('.tabs');
      if(tabsEl){
        const panel=tabsEl.parentElement;
        initTabs(panel);
      }
    }catch(e){
      content.innerHTML=`<div class="card"><p class="tm">Error: ${e.message}</p></div>`;
      console.error(e);
    }
  });
}

/* ═══════════ AUTH ═══════════ */
function doLogin(){
  const user=document.getElementById('lu').value.trim();
  const pass=document.getElementById('lp').value.trim();
  const role=document.getElementById('lr').value;
  if(!user||!pass){U.toast('Please enter username and password','error');return;}
  const roleInfo=DB.roles[role]||DB.roles.admin;
  document.getElementById('sb-name').textContent=user.charAt(0).toUpperCase()+user.slice(1);
  document.getElementById('sb-role').textContent=roleInfo.label;
  document.getElementById('sb-av').textContent=DB.initials(user+' x');
  document.getElementById('sb-av').className='av av-md '+roleInfo.col;
  buildNav(role);
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app-shell').classList.remove('hidden');
  showPage('dashboard');
  U.toast('Welcome, '+user.charAt(0).toUpperCase()+user.slice(1)+'!','success');
}
function doLogout(){
  if(!confirm('Sign out of SRP Hospital?'))return;
  document.getElementById('app-shell').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
}
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!document.getElementById('login-screen').classList.contains('hidden'))doLogin();
});
</script>
